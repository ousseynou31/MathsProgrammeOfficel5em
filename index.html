<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATHS 5ème - V1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="license-gate" class="gate">
        <div class="glass-card">
            <h1>ACTIVATION</h1>
            <div id="display-device-id" class="id-display">...</div>
            <input type="number" id="input-license" class="input-3d" placeholder="CODE PIN">
            <button class="btn-3d btn-gold" onclick="verifierLicence()">ACTIVER</button>
        </div>
    </div>

    <div id="registration-gate" class="gate">
        <div class="glass-card">
            <h1>INSCRIPTION</h1>
            <input type="text" id="reg-nom" class="input-3d" placeholder="NOM COMPLET">
            <input type="tel" id="reg-tel" class="input-3d" placeholder="TÉLÉPHONE">
            <button class="btn-3d btn-accent" onclick="enregistrerProfil()">CRÉER COMPTE</button>
        </div>
    </div>

    <div id="hub-accueil" class="main-app" style="display:none;">
        <header class="header-minimal">
            <h1 id="admin-trigger" class="titre-officiel">
                BIENVENU DANS MATHS 5em PROGRAMME OFFICIEL V1
            </h1>
        </header>
        
        <main class="empty-body">
            </main>
    </div>

    <div id="page-admin" class="full-page">
        <div class="admin-header">
            <h2>ADMINISTRATION V1</h2>
            <button onclick="naviguer('hub-accueil')" class="btn-close">RETOUR</button>
        </div>
        <div id="admin-user-list" class="user-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
