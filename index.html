<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Système Diouf - Maths 5ème</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="license-gate" class="gate">
        <div class="glass-card anim-pop">
            <h1 class="glow-text">ACTIVATION V3.2</h1>
            <p style="color:#888; font-size:0.7rem;">ID APPAREIL À COMMUNIQUER :</p>
            <div id="display-device-id" class="id-display">CHARGEMENT...</div>
            <input type="number" id="input-license" class="input-3d" placeholder="CODE PIN 8 CHIFFRES">
            <button class="btn-3d btn-gold" onclick="verifierLicence()">DÉVERROUILLER L'ACCÈS</button>
        </div>
    </div>

    <div id="registration-gate" class="gate">
        <div class="glass-card anim-pop">
            <h1 class="glow-text">PROFIL CLOUD</h1>
            <p style="font-size:0.7rem; margin-bottom:15px;">Enregistrez votre compte pour synchroniser vos cours.</p>
            <input type="text" id="reg-nom" class="input-3d" placeholder="VOTRE NOM COMPLET">
            <input type="tel" id="reg-tel" class="input-3d" placeholder="VOTRE TÉLÉPHONE">
            <button class="btn-3d btn-accent" onclick="enregistrerProfil()">CRÉER MON COMPTE</button>
        </div>
    </div>

    <div id="banned-screen" class="gate" style="background: #450a0a;">
        <div class="glass-card">
            <h1 style="color:#ef4444">ACCÈS REFUSÉ</h1>
            <p id="ban-id-display" style="font-family: monospace; color: #fca5a5; font-size: 0.8rem;"></p>
            <h2 id="ban-reason" style="font-size: 0.9rem; margin: 15px 0; color:white;">Accès suspendu ou expiré</h2>
            <button class="btn-3d" onclick="location.reload()" style="background:white; color:black;">RÉESSAYER</button>
        </div>
    </div>

    <div id="hub-accueil" class="main-app" style="display:none;">
        <header class="header">
            <div class="status-bar">
                <span id="cloud-dot"></span>
                <span id="cloud-text">SYNCHRO...</span>
            </div>
            <div id="admin-trigger" class="admin-dot"></div>
        </header>
        
        <div class="content">
            <h1 id="user-welcome">Bonjour</h1>
            <p>Bienvenue dans votre espace Maths 5ème.</p>
            </div>
    </div>

    <div id="page-admin" class="full-page">
        <div class="admin-header">
            <h2>GESTION ÉLÈVES</h2>
            <button onclick="naviguer('hub-accueil')" class="btn-close">RETOUR</button>
        </div>
        
        <div class="admin-tools">
            <div class="stat-item">Clients: <b id="dash-total">0</b></div>
            <input type="text" id="admin-search" onkeyup="filtrerClients()" class="input-3d" placeholder="Chercher un nom...">
        </div>

        <div id="admin-user-list" class="user-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
