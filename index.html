<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maths 5ème Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="cloud-status">
        <div id="cloud-dot"></div> <span id="cloud-text">SYNCHRONISATION</span>
    </div>

    <div id="license-gate" class="screen">
        <div class="glass-card">
            <h1 class="glow-text">ACTIVATION</h1>
            <p class="small-info">ID APPAREIL : <span id="display-device-id">...</span></p>
            <input type="number" id="input-license" class="input-3d" placeholder="CODE PIN">
            <button class="btn-3d btn-gold" onclick="verifierLicence()">DÉVERROUILLER</button>
        </div>
    </div>

    <div id="registration-gate" class="screen" style="display:none;">
        <div class="glass-card">
            <h2 class="glow-text">NOUVEAU COMPTE</h2>
            <input type="text" id="reg-nom" class="input-3d" placeholder="NOM COMPLET">
            <input type="tel" id="reg-tel" class="input-3d" placeholder="TÉLÉPHONE">
            <button class="btn-3d btn-p" onclick="enregistrerProfil()">CRÉER MON ACCÈS</button>
            <button class="btn-link" onclick="recupererCompte()">J'ai déjà un compte</button>
        </div>
    </div>

    <div id="banned-screen" class="screen" style="display:none;">
        <div class="glass-card border-red">
            <h1 class="txt-red">ACCÈS REFUSÉ</h1>
            <p id="ban-reason" style="margin:15px 0;"></p>
            <div id="ban-id-display" class="id-tag"></div>
            <button class="btn-3d btn-whatsapp" onclick="window.open('https://wa.me/221770000000')">CONTACTER L'ADMIN</button>
        </div>
    </div>

    <div id="hub-accueil" class="screen" style="display:none;">
        <h1 id="admin-trigger" class="main-title glow-text">MATHS 5<sup>ème</sup></h1>
        
        <div class="button-stack">
            <button class="btn-3d btn-p" onclick="ouvrirChapitre(1)">📐 GÉOMÉTRIE</button>
            <button class="btn-3d btn-p" onclick="ouvrirChapitre(2)">🔢 CALCULS</button>
            <button class="btn-3d btn-p" onclick="ouvrirChapitre(3)">📊 DONNÉES</button>
        </div>

        <button class="btn-3d btn-exit" onclick="deconnexionManuelle()">DÉCONNEXION</button>
    </div>

    <div id="page-admin" class="screen" style="display:none; align-items:flex-start; padding:20px;">
        <div class="admin-top">
            <h2 class="txt-gold">🛡️ GESTIONNAIRE</h2>
            <button class="btn-close" onclick="naviguer('hub-accueil')">RETOUR</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">TOTAL ÉLÈVES<b id="dash-total-a">0</b></div>
            <div class="stat-card">CAISSE<b id="dash-total-global">0 F</b></div>
        </div>

        <div class="admin-grid">
            <button class="btn-3d btn-sm purp" onclick="chargerHistoriquePaiements()">📊 HISTO</button>
            <button class="btn-3d btn-sm blue" onclick="ouvrirRapport()">📋 BILAN</button>
            <button class="btn-3d btn-sm gold" onclick="forceReparationDates()">🔄 FIX</button>
            <button class="btn-3d btn-sm red" onclick="nettoyerHistoriqueComplet()">⚠️ PURGE</button>
        </div>

        <div class="admin-card">
            <h3>TARIFS ABONNEMENTS (FCFA)</h3>
            <div class="price-row">
                <input type="number" id="price-A" class="input-3d-sm" placeholder="Cat A">
                <input type="number" id="price-B" class="input-3d-sm" placeholder="Cat B">
                <input type="number" id="price-C" class="input-3d-sm" placeholder="Cat C">
            </div>
            <button class="btn-3d btn-save" onclick="sauvegarderTarifs()">SYNCHRONISER TARIFS</button>
        </div>

        <input type="text" id="admin-search" class="search-3d" placeholder="Rechercher un élève..." oninput="filtrerClients()">
        <div id="admin-user-list" class="user-list-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
