<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATHS 5ème - PROGRAMME OFFICIEL</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="license-gate" class="gate">
        <div class="glass-card anim-pop">
            <h1 class="glow-text">ACTIVATION</h1>
            <p class="label">ID UNIQUE :</p>
            <div id="display-device-id" class="id-display">...</div>
            <input type="number" id="input-license" class="input-3d" placeholder="CODE PIN 8 CHIFFRES">
            <button class="btn-3d btn-gold" onclick="verifierLicence()">
                <span>DÉVERROUILLER</span>
            </button>
        </div>
    </div>

    <div id="registration-gate" class="gate">
        <div class="glass-card anim-pop">
            <h1 class="glow-text">MON PROFIL</h1>
            <input type="text" id="reg-nom" class="input-3d" placeholder="NOM COMPLET">
            <input type="tel" id="reg-tel" class="input-3d" placeholder="TÉLÉPHONE (SANS INDICATIF)">
            <button class="btn-3d btn-accent" onclick="enregistrerProfil()">
                <span>CRÉER MON COMPTE</span>
            </button>
        </div>
    </div>

    <div id="hub-accueil" class="main-app" style="display:none;">
        <div class="hero-container">
            <div id="admin-trigger" class="titre-officiel-premium">
                BIENVENU DANS MATHS 5em<br>
                <span>PROGRAMME OFFICIEL V1</span>
            </div>
        </div>
    </div>

    <div id="page-admin" class="full-page">
        <div class="admin-header">
            <h2>GESTIONNAIRE DIOUF</h2>
            <button onclick="naviguer('hub-accueil')" class="btn-close">RETOUR</button>
        </div>
        <div id="admin-user-list" class="user-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
