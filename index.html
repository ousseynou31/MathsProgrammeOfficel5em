<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Maths Programme Officel 5em V1- SYSTÈME PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cloud-status">
        <div id="cloud-dot"></div>
        <span id="cloud-text">SYNCHRONISATION...</span>
    </div>

    <div id="license-gate" class="gate">
        <div class="card-security">
            <h2>V1 BUSINESS PRO</h2>
            <p class="id-display">ID APPAREIL : <span id="display-device-id">...</span></p>
            <input type="number" id="input-license" placeholder="ENTRER CODE PIN">
            <button class="btn-main" onclick="verifierLicence()">ACTIVER L'ACCÈS</button>
        </div>
    </div>

    <div id="registration-gate" class="gate">
        <div class="card-security">
            <h2>CRÉER VOTRE PROFIL</h2>
            <input type="text" id="reg-nom" placeholder="Nom Complet">
            <input type="tel" id="reg-tel" placeholder="Numéro Téléphone">
            <button class="btn-main" onclick="enregistrerProfil()">S'ENREGISTRER</button>
            <button class="btn-sub" onclick="recupererCompte()">J'ai déjà un compte</button>
        </div>
    </div>

    <div id="banned-screen" class="gate">
        <div class="ban-content">
            <h1>🚫</h1>
            <h2>ACCÈS BLOQUÉ</h2>
            <p id="ban-id-display"></p>
            <button class="btn-main" onclick="location.reload()">RÉESSAYER</button>
        </div>
    </div>

    <div id="hub-accueil" style="display:none;">
        <header>
            <h1 id="admin-trigger">DIOUF OUS V32</h1>
        </header>
        
        <div class="main-menu">
            <p style="text-align:center; color:gray;">Système Opérationnel</p>
        </div>
    </div>

    <div id="page-admin" class="full-page">
        <div class="admin-header">
            <h2>🛡️ ADMINISTRATION</h2>
            <button onclick="location.reload()">QUITTER</button>
        </div>

        <div class="admin-dashboard">
            <div class="stat-box">Total<br><b id="dash-total-a">0</b></div>
            <div class="stat-box">Argent<br><b id="dash-total-global">0</b></div>
            <div class="stat-box">Retard<br><b id="dash-retard">0</b></div>
        </div>

        <div class="admin-tools">
            <input type="text" id="admin-search" placeholder="Rechercher..." oninput="filtrerClients()">
            
            <div class="filter-bar">
                <button onclick="loadUsers('TOUT')">TOUT</button>
                <button onclick="loadUsers('A')">CAT A</button>
                <button onclick="ouvrirRapport()">📋 BILAN</button>
            </div>

            <div class="price-settings">
                <input type="number" id="price-A" placeholder="Prix A">
                <input type="number" id="price-B" placeholder="Prix B">
                <input type="number" id="price-C" placeholder="Prix C">
                <button onclick="sauvegarderTarifs()">💾 MAJ PRIX</button>
            </div>
        </div>

        <div id="admin-user-list"></div>
    </div>

    <div id="modal-rapport" class="modal">
        <div class="modal-content">
            <button onclick="fermerRapport()">FERMER</button>
            <button onclick="sauvegarderPDF()">PDF</button>
            <div id="contenu-rapport"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
