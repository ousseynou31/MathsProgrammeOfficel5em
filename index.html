<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATHS 5ème — SYSTÈME DIOUF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="license-gate" class="gate">
        <div class="glass-card">
            <h1>ACTIVATION V3.2</h1>
            <div id="display-device-id" class="id-display">...</div>
            <input type="number" id="input-license" class="input-3d" placeholder="PIN 8 CHIFFRES">
            <button class="btn-3d btn-gold" onclick="verifierLicence()">ACTIVER</button>
        </div>
    </div>

    <div id="registration-gate" class="gate">
        <div class="glass-card">
            <h1>INSCRIPTION CLOUD</h1>
            <input type="text" id="reg-nom" class="input-3d" placeholder="NOM COMPLET">
            <input type="tel" id="reg-tel" class="input-3d" placeholder="TÉLÉPHONE">
            <button class="btn-3d btn-accent" onclick="enregistrerProfil()">CRÉER MON COMPTE</button>
        </div>
    </div>

    <div id="banned-screen" class="gate" style="background: #450a0a;">
        <div class="glass-card">
            <h1 style="color:#ef4444">ACCÈS REFUSÉ</h1>
            <p id="ban-reason" style="margin: 15px 0;"></p>
            <button class="btn-3d" onclick="location.reload()">RÉESSAYER</button>
        </div>
    </div>

    <div id="hub-accueil" class="main-app" style="display:none;">
        <header class="header">
            <div class="status-group">
                <span id="cloud-dot"></span>
                <span id="cloud-text" style="font-size:0.7rem">CONNEXION...</span>
            </div>
            <div id="admin-trigger" class="admin-dot"></div>
        </header>
        
        <div class="hero">
            <h1 class="main-title">MATHS 5ème</h1>
            <h2 class="sub-title">SYSTÈME DIOUF</h2>
            <p id="user-welcome">Chargement de votre profil...</p>
        </div>

        <div class="menu-grid">
            </div>
    </div>

    <div id="page-admin" class="full-page">
        <div class="admin-header">
            <h2>TABLEAU DE BORD ADMIN</h2>
            <button onclick="naviguer('hub-accueil')" class="btn-back">RETOUR</button>
        </div>
        
        <div class="admin-stats">
            <div>Élèves : <b id="dash-total">0</b></div>
            <input type="text" id="admin-search" onkeyup="filtrerClients()" class="input-3d" placeholder="Rechercher...">
        </div>

        <div id="admin-user-list" class="user-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
